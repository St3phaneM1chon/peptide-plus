name: Playwright E2E Tests

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6 AM UTC
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: peptide
          POSTGRES_PASSWORD: peptide123
          POSTGRES_DB: peptide_plus
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to test DB
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://peptide:peptide123@localhost:5433/peptide_plus

      - name: Seed audit types
        run: npx ts-node --compiler-options '{"module":"CommonJS"}' scripts/seed-audit-types.ts
        env:
          DATABASE_URL: postgresql://peptide:peptide123@localhost:5433/peptide_plus

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: postgresql://peptide:peptide123@localhost:5433/peptide_plus
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

      - name: Run Playwright tests
        run: npx playwright test
        env:
          DATABASE_URL: postgresql://peptide:peptide123@localhost:5433/peptide_plus
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
