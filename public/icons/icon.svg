<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38A169;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#319795;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3182CE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#grad1)" rx="110"/>

  <!-- BC Initials -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="240" font-weight="bold" fill="white" text-anchor="middle">BC</text>

  <!-- Decorative molecule nodes -->
  <circle cx="140" cy="140" r="8" fill="white" opacity="0.6"/>
  <circle cx="180" cy="120" r="8" fill="white" opacity="0.6"/>
  <circle cx="220" cy="140" r="8" fill="white" opacity="0.6"/>
  <line x1="140" y1="140" x2="180" y2="120" stroke="white" stroke-width="3" opacity="0.4"/>
  <line x1="180" y1="120" x2="220" y2="140" stroke="white" stroke-width="3" opacity="0.4"/>

  <!-- Leaf accent -->
  <circle cx="310" cy="130" r="8" fill="white" opacity="0.5"/>
  <circle cx="350" cy="110" r="6" fill="white" opacity="0.4"/>
  <circle cx="370" cy="140" r="7" fill="white" opacity="0.5"/>
  <line x1="310" y1="130" x2="350" y2="110" stroke="white" stroke-width="2.5" opacity="0.35"/>
  <line x1="350" y1="110" x2="370" y2="140" stroke="white" stroke-width="2.5" opacity="0.35"/>
</svg>
